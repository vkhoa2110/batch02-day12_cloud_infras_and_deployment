# ============================================================
# cloudbuild.yaml — Google Cloud Build CI/CD Pipeline
#
# Trigger: tự động chạy khi push lên main branch
# Steps: test → build Docker image → push → deploy to Cloud Run
#
# Setup:
#   gcloud builds submit --config cloudbuild.yaml .
# ============================================================

steps:
  # ──────────────────────────────────────
  # Step 1: Run tests
  # ──────────────────────────────────────
  - name: python:3.11-slim
    id: test
    entrypoint: bash
    args:
      - -c
      - |
        pip install -r requirements.txt pytest
        pytest tests/ -v --tb=short
        echo "✅ Tests passed"

  # ──────────────────────────────────────
  # Step 2: Build Docker image
  # ──────────────────────────────────────
  - name: gcr.io/cloud-builders/docker
    id: build
    args:
      - build
      - --tag=gcr.io/$PROJECT_ID/ai-agent:$COMMIT_SHA
      - --tag=gcr.io/$PROJECT_ID/ai-agent:latest
      - --cache-from=gcr.io/$PROJECT_ID/ai-agent:latest   # Layer cache
      - .
    waitFor: [test]

  # ──────────────────────────────────────
  # Step 3: Push to Container Registry
  # ──────────────────────────────────────
  - name: gcr.io/cloud-builders/docker
    id: push
    args:
      - push
      - --all-tags
      - gcr.io/$PROJECT_ID/ai-agent
    waitFor: [build]

  # ──────────────────────────────────────
  # Step 4: Deploy to Cloud Run
  # ──────────────────────────────────────
  - name: gcr.io/cloud-builders/gcloud
    id: deploy
    args:
      - run
      - deploy
      - ai-agent
      - --image=gcr.io/$PROJECT_ID/ai-agent:$COMMIT_SHA
      - --region=asia-southeast1
      - --platform=managed
      - --allow-unauthenticated       # Public endpoint
      - --min-instances=1             # Tránh cold start
      - --max-instances=10            # Giới hạn scale
      - --memory=512Mi
      - --cpu=1
      - --timeout=60s
      - --set-env-vars=ENVIRONMENT=production
      - --set-secrets=OPENAI_API_KEY=openai-key:latest  # từ Secret Manager
    waitFor: [push]

# ──────────────────────────────────────
# Build options
# ──────────────────────────────────────
options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_MEDIUM

# ──────────────────────────────────────
# Build timeout
# ──────────────────────────────────────
timeout: 1200s  # 20 phút max
