# ============================================================
# service.yaml — Cloud Run Service Definition (IaC)
#
# Deploy:
#   gcloud run services replace service.yaml --region=asia-southeast1
# ============================================================

apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: ai-agent
  annotations:
    run.googleapis.com/ingress: all    # public
spec:
  template:
    metadata:
      annotations:
        # ──────────────────────────────────────
        # Scaling config
        # ──────────────────────────────────────
        autoscaling.knative.dev/minScale: "1"    # giữ 1 instance → tránh cold start
        autoscaling.knative.dev/maxScale: "10"   # tối đa 10 instances

        # Concurrency: mỗi instance xử lý tối đa 80 requests đồng thời
        autoscaling.knative.dev/target: "80"

    spec:
      containerConcurrency: 80
      timeoutSeconds: 60

      containers:
        - image: gcr.io/PROJECT_ID/ai-agent:latest
          ports:
            - containerPort: 8000

          # ──────────────────────────────────────
          # Resources
          # ──────────────────────────────────────
          resources:
            limits:
              cpu: "1"
              memory: 512Mi
            requests:
              cpu: "0.5"
              memory: 256Mi

          # ──────────────────────────────────────
          # Environment variables
          # ──────────────────────────────────────
          env:
            - name: ENVIRONMENT
              value: production
            - name: PORT
              value: "8000"
            # Secret từ Secret Manager — KHÔNG hardcode
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: openai-key
                  key: latest
            - name: AGENT_API_KEY
              valueFrom:
                secretKeyRef:
                  name: agent-api-key
                  key: latest

          # ──────────────────────────────────────
          # Health checks
          # ──────────────────────────────────────
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30

          startupProbe:
            httpGet:
              path: /ready
              port: 8000
            initialDelaySeconds: 5
            failureThreshold: 10
            periodSeconds: 3
