# ============================================================
# Nginx — Reverse Proxy & Load Balancer cho Agent Stack
# ============================================================

events {
    worker_connections 1024;
}

http {
    # ──────────────────────────────────────
    # Upstream: danh sách agent instances
    # Nginx sẽ round-robin giữa các instance
    # ──────────────────────────────────────
    upstream agent_backend {
        server agent:8000;
        # Khi scale: thêm nhiều instances
        # server agent_2:8000;
        # server agent_3:8000;

        # Health check — bỏ qua instance không healthy
        keepalive 32;
    }

    # Rate limiting: 10 requests/giây per IP
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

    server {
        listen 80;
        server_name _;

        # ──────────────────────────────────────
        # Security headers
        # ──────────────────────────────────────
        add_header X-Frame-Options "DENY";
        add_header X-Content-Type-Options "nosniff";
        add_header X-XSS-Protection "1; mode=block";
        server_tokens off;  # Ẩn Nginx version

        # ──────────────────────────────────────
        # API routes
        # ──────────────────────────────────────
        location / {
            # Apply rate limiting
            limit_req zone=api_limit burst=20 nodelay;
            limit_req_status 429;

            # Proxy đến agent
            proxy_pass http://agent_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Timeouts
            proxy_connect_timeout 10s;
            proxy_read_timeout 60s;  # LLM calls có thể chậm
        }

        # Health check không cần rate limit
        location /health {
            proxy_pass http://agent_backend/health;
            access_log off;  # Không log health checks
        }

        # Custom error pages
        error_page 429 /rate_limited.json;
        location = /rate_limited.json {
            return 429 '{"error":"Too many requests","retry_after":1}';
            add_header Content-Type application/json;
        }
    }
}
